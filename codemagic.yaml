workflows:
  android-build:
    name: Android APK Build

    environment:
      node: latest
      vars:
        EXPO_TOKEN: "-IEWeg-Dik6_xfbNlix43GFBXDRSwBKb-32NpqOV"

    working_directory: frontend

    scripts:
      - rm -rf .expo
      - npm install
      - npm install -g eas-cli
      - npx eas init --non-interactive --force
      - npx eas build --platform android --non-interactive --profile preview

    artifacts:
      - "**/*.apk"
