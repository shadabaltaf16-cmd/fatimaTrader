workflows:
  android-build:
    name: Android APK Build

    environment:
      node: latest

    working_directory: frontend

    scripts:
      - npm install
      - npx expo prebuild --platform android --clean
      - ls android
      - cd android
      - chmod +x gradlew
      - ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk
